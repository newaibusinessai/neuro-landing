<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A0A0F">
  <meta name="robots" content="noindex,follow">
  <title>Page Not Found | Neuro</title>
  <link rel="icon" href="/assets/icon.png" type="image/png">
  <link rel="apple-touch-icon" href="/assets/icon-512.png">
  <link rel="stylesheet" href="/style.css">
  <style>
    .notfound {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .notfound h1 {
      font-size: 96px;
      color: var(--primary);
      margin-bottom: 8px;
      letter-spacing: -2px;
    }
    .notfound h2 {
      font-size: 28px;
      margin-bottom: 16px;
    }
    .notfound p {
      color: var(--text-secondary);
      margin-bottom: 32px;
      max-width: 460px;
    }
    .notfound .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .notfound .actions a.secondary {
      background: var(--surface);
      color: var(--text);
      padding: 14px 32px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="notfound">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist. Maybe it moved, or maybe you mistyped the URL.</p>
    <div class="actions">
      <a href="/" class="btn-primary">Go to Homepage</a>
      <a href="https://play.google.com/store/apps/details?id=com.neuro.quitporn" class="secondary" target="_blank" rel="noopener">Get the App</a>
    </div>
    <p style="margin-top: 32px; font-size: 13px; color: var(--text-tertiary);">
      Need help? Email <a href="mailto:newaibusinessai@gmail.com">newaibusinessai@gmail.com</a>
    </p>
  </main>
</body>
</html>
