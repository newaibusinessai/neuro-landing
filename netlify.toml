# Netlify configuration for tryneuroapp.com

[build]
  publish = "."

# Force www -> apex redirect (HTTPS is automatic on Netlify)
[[redirects]]
  from = "https://www.tryneuroapp.com/*"
  to = "https://tryneuroapp.com/:splat"
  status = 301
  force = true

# Note: Netlify automatically serves /404.html for unmatched routes — no redirect rule needed

# ============ HEADERS ============

# Security + performance headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# HTML: no aggressive caching (so updates appear quickly)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# CSS / JS: long-term cache (versioned)
[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images: long-term cache
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# robots.txt and sitemap.xml: short cache so search engines see updates
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
